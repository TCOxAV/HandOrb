<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Orb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #07091a;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Starfield Canvas ── */
        #starsCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

        /* ── Galaxy explosion canvas ── */
        #galaxyCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

        /* ══════════════════════════════════════════
           TOP BAR
        ══════════════════════════════════════════ */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 40;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: linear-gradient(180deg, rgba(7,9,26,0.92) 0%, rgba(7,9,26,0) 100%);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .top-bar-brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .header-eyebrow {
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #4a68d8;
            font-weight: 500;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #8ab4ff 55%, #5a7eff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Gesture pill hints in top bar */
        .gesture-pills {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .gpill {
            font-size: 0.65rem;
            color: #3a4870;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 999px;
            padding: 3px 9px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #status {
            font-size: 0.72rem;
            color: #5a70b0;
            transition: color .3s;
            white-space: nowrap;
        }
        #status.live  { color: #4de88e; }
        #status.error { color: #ff6b6b; }

        #startButton {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #3f7bff, #6a4fff);
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.55rem 1.3rem;
            border-radius: 999px;
            cursor: pointer;
            transition: transform .18s, box-shadow .18s, opacity .2s;
            box-shadow: 0 4px 20px rgba(63,123,255,.35);
            white-space: nowrap;
        }
        #startButton:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(63,123,255,.5); }
        #startButton:disabled { opacity: .35; cursor: default; }

        /* ══════════════════════════════════════════
           BOTTOM-LEFT PiP PANEL
        ══════════════════════════════════════════ */
        .pip-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 40;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
        }

        .pip-label {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #3a4870;
            padding-left: 2px;
        }

        #webcam-container {
            width: 160px;
            height: 160px;
            border-radius: 14px;
            overflow: hidden;
            border: 1.5px solid rgba(90,126,255,.28);
            position: relative;
            background: rgba(10,15,40,0.6);
            flex-shrink: 0;
        }
        #webcam-container.active {
            box-shadow: 0 0 20px rgba(63,123,255,.25), 0 4px 24px rgba(0,0,0,0.5);
        }
        #webcam-container canvas { width: 100% !important; height: 100% !important; display: block; }

        /* Compact confidence bars */
        #label-container {
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .pred-row { display: flex; flex-direction: column; gap: 2px; }
        .pred-header { display: flex; justify-content: space-between; font-size: 0.63rem; color: #4a5a8a; }
        .pred-header .pred-name { color: #7a94cc; font-weight: 500; }
        .pred-bar-bg { height: 3px; border-radius: 999px; background: rgba(255,255,255,.05); overflow: hidden; }
        .pred-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg,#3f7bff,#7a5fff); width: 0%; transition: width .2s ease; }
        .pred-bar-fill.top { background: linear-gradient(90deg,#4de88e,#2aafff); }

        /* Gesture hints below bars */
        .gesture-hints {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 2px;
        }
        .gh {
            font-size: 0.62rem;
            color: #2d3860;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .gh span { font-size: 0.85rem; }

        /* ══════════════════════════════════════════
           ORB — free-floating, GPU-composited
        ══════════════════════════════════════════ */
        #orb-wrapper {
            position: fixed;
            width: 140px;
            height: 140px;
            pointer-events: none;
            z-index: 20;
            left: 0; top: 0;
            transform: translate(calc(50vw + 120px), 50vh) translate(-50%, -50%);
            will-change: transform;
        }

        .orb-ring {
            position: absolute; inset: 0; border-radius: 50%;
            border: 1px solid rgba(100,160,255,.15);
            animation: ringPulse 3s ease-in-out infinite;
            opacity: 0; transition: opacity .4s;
        }
        .orb-ring:nth-child(2) { inset:-14px; animation-delay:.5s; border-color:rgba(100,160,255,.1); }
        .orb-ring:nth-child(3) { inset:-28px; animation-delay:1s;  border-color:rgba(100,160,255,.06); }
        #orb-wrapper.show .orb-ring { opacity: 1; }
        @keyframes ringPulse {
            0%,100% { transform:scale(1);    opacity:.6; }
            50%      { transform:scale(1.06); opacity:.15; }
        }

        #orb {
            position: absolute; inset: 0; border-radius: 50%;
            opacity: 0; transform: scale(.3);
            transition: opacity .35s cubic-bezier(.34,1.56,.64,1),
                        transform .35s cubic-bezier(.34,1.56,.64,1);
            background:
                radial-gradient(circle at 32% 28%, rgba(255,255,255,.55) 0%, transparent 40%),
                radial-gradient(circle at 68% 72%, rgba(40,100,255,.4) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, #4a90ff 0%, #1a3ccc 55%, #0d1f8a 100%);
            box-shadow:
                inset -8px -8px 24px rgba(0,0,30,.55),
                inset 6px 6px 18px rgba(200,230,255,.25),
                0 0 40px rgba(60,120,255,.7),
                0 0 80px rgba(60,120,255,.3);
            animation: orbFloat 4s ease-in-out infinite;
        }
        #orb.show { opacity:1; transform:scale(1); }
        @keyframes orbFloat {
            0%,100% { top: 0; }
            50%      { top: -8px; }
        }

        #orbCanvas {
            position: absolute; inset: 0; border-radius: 50%;
            pointer-events: none; opacity: 0; transition: opacity .35s;
        }
        #orb.show ~ #orbCanvas { opacity: 1; }

        #skeletonCanvas {
            position: absolute; inset: -60px;
            pointer-events: none; border-radius: 50%;
            opacity: 0; transition: opacity .5s;
        }
        #orb-wrapper.skeleton #skeletonCanvas { opacity: 1; }
        #orb-wrapper.skeleton #orb          { opacity: 0 !important; }
        #orb-wrapper.skeleton #orbCanvas    { opacity: 0 !important; }
        #orb-wrapper.skeleton .orb-ring     { opacity: 0; }

        /* Orb label */
        #orbLabel {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem; letter-spacing: .1em; text-transform: uppercase;
            color: #3a5090; transition: color .3s;
            z-index: 25; pointer-events: none;
            white-space: nowrap;
        }
        #orbLabel.open   { color: #5a9fff; }
        #orbLabel.closed { color: #384070; }
        #orbLabel.sphere { color: #d0a0ff; }
    </style>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<canvas id="galaxyCanvas"></canvas>

<!-- ORB — free-floating -->
<div id="orb-wrapper">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div id="orb"></div>
    <canvas id="orbCanvas" width="140" height="140"></canvas>
    <canvas id="skeletonCanvas"></canvas>
</div>
<div id="orbLabel">Waiting…</div>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="top-bar-brand">
        <p class="header-eyebrow">Teachable Machine</p>
        <h1>Hand Orb</h1>
    </div>
    <div class="gesture-pills">
        <div class="gpill"><span>☝️</span> summon</div>
        <div class="gpill"><span>✋</span> drag orb</div>
        <div class="gpill"><span>✊</span> dismiss</div>
        <div class="gpill"><span>🤌</span> pinch & hold → explode</div>
    </div>
    <div class="top-bar-right">
        <div id="status">Click Start to begin.</div>
        <button id="startButton">◎ Start Camera</button>
    </div>
</div>

<!-- BOTTOM-LEFT PiP: webcam + prediction bars + hints -->
<div class="pip-panel">
    <div class="pip-label">📷 Camera feed</div>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div class="gesture-hints">
        <div class="gh"><span>☝️</span> 1 finger up — summon orb</div>
        <div class="gh"><span>✋</span> Open palm — drag orb</div>
        <div class="gh"><span>✊</span> Fist — dismiss orb</div>
        <div class="gh"><span>🤌</span> Pinch and hold — skeleton → explode</div>
    </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="scriptt.js"></script>

<script>
/* ══════════════════════════════════════════
   STARS (Hardware accelerated canvas)
══════════════════════════════════════════ */
(function(){
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d', {alpha: false}); // opaque background = faster
    let W, H;
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const stars = Array.from({length: 120}, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 1.5 + 0.5,
        minA: Math.random() * 0.08,
        maxA: Math.random() * 0.5 + 0.1,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.02 + 0.005
    }));

    (function draw(){
        // clear with solid background
        ctx.fillStyle = '#07091a';
        ctx.fillRect(0, 0, W, H);
        
        stars.forEach(s => {
            s.phase += s.speed;
            const a = s.minA + (s.maxA - s.minA) * (0.5 + 0.5 * Math.sin(s.phase));
            ctx.fillStyle = `rgba(255,255,255,${a})`;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
        requestAnimationFrame(draw);
    })();
})();

/* ══════════════════════════════════════════
   ORB SPARKLE CANVAS
══════════════════════════════════════════ */
(function(){
    const canvas = document.getElementById('orbCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height, R = W/2;
    const pts = Array.from({length:28},()=>({
        angle: Math.random()*Math.PI*2,
        radius: Math.random()*(R-14)+5,
        speed: (Math.random()*.008+.004)*(Math.random()<.5?1:-1),
        size: Math.random()*2+.5,
        alpha: Math.random()*.6+.3,
        phase: Math.random()*Math.PI*2
    }));
    
    let t = 0;
    let lastShownTime = Date.now();
    
    (function draw(){
        // Only run the heavy math/drawing if orb is visible, or fading out
        if (window.orbVisible) lastShownTime = Date.now();
        if (Date.now() - lastShownTime > 500) {
            // throttle when hidden
            requestAnimationFrame(draw);
            return;
        }

        ctx.clearRect(0,0,W,H);
        t += .025;
        pts.forEach(p=>{
            p.angle += p.speed;
            const x = R + Math.cos(p.angle)*p.radius;
            const y = R + Math.sin(p.angle)*p.radius;
            const a = p.alpha * (.5 + .5 * Math.sin(t + p.phase));
            ctx.beginPath();
            ctx.arc(x,y,p.size,0,Math.PI*2);
            ctx.fillStyle = `rgba(180,220,255,${a})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    })();
})();
</script>
</body>
</html>
